services:
  - type: web
    name: govmatch-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /usr/lib/chromium
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: govmatch-db
          property: connectionString

databases:
  - name: govmatch-db
    plan: free
    databaseName: govmatch
    user: govmatch
